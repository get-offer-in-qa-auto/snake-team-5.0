name: teamcity-autotests-ci

services:
  teamcity-server:
    image: jetbrains/teamcity-server:2026.1.1
    container_name: teamcity-server-ci
    ports:
      - "8111:8111"
    environment:
      TEAMCITY_SERVER_OPTS: "-Dteamcity.superUser.token=${TEAMCITY_SUPER_USER_TOKEN:?TEAMCITY_SUPER_USER_TOKEN is required} -Dteamcity.internal.accessTokens.enableCreationForOtherUsers=true"
    volumes:
      - teamcity-data:/data/teamcity_server/datadir
      - teamcity-logs:/opt/teamcity/logs

  # CI agents are ephemeral. Keep this service free of container_name and shared
  # volumes so Docker Compose can create isolated replicas with --scale.
  teamcity-agent:
    image: jetbrains/teamcity-agent:2026.1.1
    depends_on:
      - teamcity-server
    environment:
      SERVER_URL: http://teamcity-server:8111

volumes:
  teamcity-data:
  teamcity-logs:
