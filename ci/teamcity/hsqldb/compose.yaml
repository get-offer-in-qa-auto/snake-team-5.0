name: teamcity-autotests-ci

services:
  teamcity-server:
    image: jetbrains/teamcity-server:2026.1.1
    container_name: teamcity-server-ci
    ports:
      - "8111:8111"
    environment:
      TEAMCITY_SERVER_OPTS: "-Dteamcity.superUser.token=${TEAMCITY_SUPER_USER_TOKEN:?TEAMCITY_SUPER_USER_TOKEN is required} -Dteamcity.internal.accessTokens.enableCreationForOtherUsers=true"
    volumes:
      - teamcity-data:/data/teamcity_server/datadir
      - teamcity-logs:/opt/teamcity/logs

  teamcity-agent:
    image: jetbrains/teamcity-agent:2026.1.1
    container_name: teamcity-agent-ci
    depends_on:
      - teamcity-server
    environment:
      SERVER_URL: http://teamcity-server:8111
      AGENT_NAME: ci-agent-1
    volumes:
      - teamcity-agent-conf:/data/teamcity_agent/conf
      - teamcity-agent-work:/opt/buildagent/work
      - teamcity-agent-system:/opt/buildagent/system
      - teamcity-agent-temp:/opt/buildagent/temp
      - teamcity-agent-tools:/opt/buildagent/tools
      - teamcity-agent-plugins:/opt/buildagent/plugins

  teamcity-agent-2:
    image: jetbrains/teamcity-agent:2026.1.1
    container_name: teamcity-agent-2-ci
    depends_on:
      - teamcity-server
    environment:
      SERVER_URL: http://teamcity-server:8111
      AGENT_NAME: ci-agent-2
    volumes:
      - teamcity-agent-2-conf:/data/teamcity_agent/conf
      - teamcity-agent-2-work:/opt/buildagent/work
      - teamcity-agent-2-system:/opt/buildagent/system
      - teamcity-agent-2-temp:/opt/buildagent/temp
      - teamcity-agent-2-tools:/opt/buildagent/tools
      - teamcity-agent-2-plugins:/opt/buildagent/plugins

volumes:
  teamcity-data:
  teamcity-logs:
  teamcity-agent-conf:
  teamcity-agent-work:
  teamcity-agent-system:
  teamcity-agent-temp:
  teamcity-agent-tools:
  teamcity-agent-plugins:
  teamcity-agent-2-conf:
  teamcity-agent-2-work:
  teamcity-agent-2-system:
  teamcity-agent-2-temp:
  teamcity-agent-2-tools:
  teamcity-agent-2-plugins:
