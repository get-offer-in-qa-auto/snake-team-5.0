name: teamcity-autotests-postgresql-ci

services:
  teamcity-postgres:
    image: postgres:17.5-alpine
    container_name: teamcity-postgresql-ci
    environment:
      POSTGRES_DB: teamcity
      POSTGRES_USER: teamcity
      POSTGRES_PASSWORD: ${TEAMCITY_POSTGRES_PASSWORD:?TEAMCITY_POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    ports:
      - "${TEAMCITY_POSTGRES_HOST_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamcity -d teamcity"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - teamcity-postgresql-data:/var/lib/postgresql/data

  prepare-teamcity-data:
    image: curlimages/curl:8.12.1
    user: "0:0"
    volumes:
      - teamcity-data:/data/teamcity_server/datadir
      - ./prepare-teamcity-data.sh:/prepare-teamcity-data.sh:ro
    entrypoint: ["/bin/sh", "/prepare-teamcity-data.sh"]

  teamcity-server:
    image: jetbrains/teamcity-server:2026.1.1
    container_name: teamcity-server-postgresql-ci
    depends_on:
      prepare-teamcity-data:
        condition: service_completed_successfully
      teamcity-postgres:
        condition: service_healthy
    ports:
      - "${TEAMCITY_POSTGRES_HTTP_PORT:-8111}:8111"
    environment:
      TEAMCITY_DB_URL: jdbc:postgresql://teamcity-postgres:5432/teamcity
      TEAMCITY_DB_USER: teamcity
      TEAMCITY_DB_PASSWORD: ${TEAMCITY_POSTGRES_PASSWORD:?TEAMCITY_POSTGRES_PASSWORD is required}
      TEAMCITY_SERVER_OPTS: "-Dteamcity.superUser.token=${TEAMCITY_SUPER_USER_TOKEN:?TEAMCITY_SUPER_USER_TOKEN is required} -Dteamcity.internal.accessTokens.enableCreationForOtherUsers=true"
    volumes:
      - teamcity-data:/data/teamcity_server/datadir
      - teamcity-logs:/opt/teamcity/logs

  # CI agents are ephemeral. Keep this service free of container_name and shared
  # volumes so Docker Compose can create isolated replicas with --scale.
  teamcity-agent:
    image: jetbrains/teamcity-agent:2026.1.1
    depends_on:
      - teamcity-server
    environment:
      SERVER_URL: http://teamcity-server:8111

volumes:
  teamcity-postgresql-data:
  teamcity-data:
  teamcity-logs:
