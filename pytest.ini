[pytest]
addopts =
    --alluredir=artifacts/allure-results
    --clean-alluredir
    --tracing=retain-on-failure
    --video=retain-on-failure
    --screenshot=only-on-failure
    --output=artifacts/playwright
norecursedirs =
    .pytest_cache
    teamcity-local
    artifacts
markers =
    smoke: minimal checks that verify the TeamCity stand is basically available
    regression: broader checks that verify TeamCity behavior on the selected test stand
    api: API tests
    ui: UI tests
    admin_session: authenticate the browser as the configured TeamCity administrator through REST API
    user_session(*sources, auth=0): authenticate the browser as a user returned by a fixture source
    entity_will_be_created(*sources): register fixture values for API cleanup before a UI action
    configuration: persistence checks that read TeamCity Data Directory configuration XML
    build_execution: tests that start or cancel TeamCity builds and require an authorized agent
