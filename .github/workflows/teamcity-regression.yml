name: TeamCity Regression

on:
  pull_request:
  workflow_dispatch:
    inputs:
      parallelism:
        description: Number of pytest workers and TeamCity agents.
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: python3 -m pip install -r requirements-dev.txt

      # Быстрые статические проверки идут первыми, чтобы не тратить время
      # на запуск Docker-стенда при очевидных проблемах в коде.
      - name: Lint Python code
        run: python3 -m ruff check .

      - name: Check Python formatting
        run: python3 -m ruff format --check .

      - name: Check static types
        run: python3 -m mypy src/main

  teamcity-api:
    name: TeamCity API regression
    needs: code-quality
    runs-on: ubuntu-latest
    env:
      TEAMCITY_PARALLELISM: ${{ inputs.parallelism || vars.TEAMCITY_PARALLELISM || '2' }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start and prepare TeamCity for API tests
        uses: ./.github/actions/teamcity-setup
        with:
          agent_count: ${{ env.TEAMCITY_PARALLELISM }}
          database_preflight: "true"
          playwright_browser: none

      - name: Run TeamCity API smoke gate
        uses: ./.github/actions/teamcity-test
        with:
          pytest_marker: "smoke and api"
          pytest_workers: ${{ env.TEAMCITY_PARALLELISM }}
          junit_filename: smoke-teamcity-api-regression.xml
          browser: none

      - name: Run remaining TeamCity API regression tests
        uses: ./.github/actions/teamcity-test
        with:
          pytest_marker: "(regression and api) and not smoke"
          pytest_workers: ${{ env.TEAMCITY_PARALLELISM }}
          junit_filename: teamcity-api-regression.xml
          preserve_allure_results: "true"
          browser: none

      - name: Collect API results and stop TeamCity
        if: always()
        uses: ./.github/actions/teamcity-report
        with:
          test_label: regression-api
          logs_artifact_name: teamcity-regression-api-logs
          results_artifact_name: teamcity-regression-api-test-results
          page_artifact_name: teamcity-regression-api-login-page
          generate_allure_report: "false"

  teamcity-ui:
    name: TeamCity UI · ${{ matrix.title }}
    needs: code-quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - browser: chromium
            title: Chromium
          - browser: firefox
            title: Firefox
          - browser: webkit
            title: WebKit
    env:
      TEAMCITY_PARALLELISM: ${{ inputs.parallelism || vars.TEAMCITY_PARALLELISM || '2' }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start and prepare TeamCity for ${{ matrix.title }}
        uses: ./.github/actions/teamcity-setup
        with:
          agent_count: ${{ env.TEAMCITY_PARALLELISM }}
          playwright_browser: ${{ matrix.browser }}

      - name: Run TeamCity UI tests in ${{ matrix.title }}
        uses: ./.github/actions/teamcity-test
        with:
          pytest_marker: "(regression) and ui"
          pytest_workers: ${{ env.TEAMCITY_PARALLELISM }}
          junit_filename: "teamcity-ui-${{ matrix.browser }}-regression.xml"
          browser: ${{ matrix.browser }}

      - name: Collect ${{ matrix.title }} results and stop TeamCity
        if: always()
        uses: ./.github/actions/teamcity-report
        with:
          test_label: "regression-${{ matrix.browser }}"
          logs_artifact_name: "teamcity-regression-${{ matrix.browser }}-logs"
          results_artifact_name: "teamcity-regression-${{ matrix.browser }}-test-results"
          page_artifact_name: "teamcity-regression-${{ matrix.browser }}-login-page"
          generate_allure_report: "false"

  teamcity-regression:
    name: TeamCity regression
    if: ${{ always() }}
    needs:
      - teamcity-api
      - teamcity-ui
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      allure_pages_ready: ${{ steps.allure-report.outputs.ready }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build combined Allure report
        id: allure-report
        uses: ./.github/actions/allure-aggregate
        with:
          source_artifact_pattern: teamcity-regression-*-allure-results
          expected_artifact_names: >-
            teamcity-regression-api-allure-results
            teamcity-regression-chromium-allure-results
            teamcity-regression-firefox-allure-results
            teamcity-regression-webkit-allure-results
          test_label: regression
          results_artifact_name: teamcity-regression-allure-results
          report_artifact_name: teamcity-regression-allure-report
          pytest_workers: ${{ inputs.parallelism || vars.TEAMCITY_PARALLELISM || '2' }}

      - name: Verify API and browser jobs
        if: always()
        shell: bash
        env:
          API_RESULT: ${{ needs.teamcity-api.result }}
          UI_RESULT: ${{ needs.teamcity-ui.result }}
        run: |
          if [ "$API_RESULT" != "success" ] || [ "$UI_RESULT" != "success" ]; then
            echo "API job result: $API_RESULT" >&2
            echo "UI matrix result: $UI_RESULT" >&2
            exit 1
          fi

  deploy-allure-pages:
    name: Publish Allure report page
    if: ${{ always() && needs.teamcity-regression.outputs.allure_pages_ready == 'true' }}
    needs: teamcity-regression
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}${{ steps.pages.outputs.report_path }}/
    steps:
      # Скачиваем код, чтобы runner видел local action для обновления Pages history.
      - name: Checkout
        uses: actions/checkout@v4

      # Добавляем текущий Allure HTML-report в уникальный каталог Pages site.
      - name: Prepare persistent Allure report page
        id: pages
        uses: ./.github/actions/publish-allure-pages
        with:
          report_artifact_name: teamcity-regression-allure-report
          suite_name: regression

      # Публикуем накопленный Pages site с историей отчетов.
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # Добавляем кликабельную ссылку на конкретный отчет в summary текущего workflow run.
      - name: Add Allure report page to summary
        run: |
          echo "## Allure report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this Allure report](${{ steps.deployment.outputs.page_url }}${{ steps.pages.outputs.report_path }}/)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open all reports index](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"
