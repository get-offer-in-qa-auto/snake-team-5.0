name: TeamCity Regression

on:
  workflow_dispatch:

jobs:
  teamcity-regression:
    name: Run TeamCity regression
    # Этот workflow запускается только вручную, но сам прогон переиспользует
    # общий TeamCity pytest runner с marker regression.
    uses: ./.github/workflows/teamcity-pytest.yml
    with:
      pytest_marker: regression
      test_label: regression
      timeout_minutes: 60
      junit_filename: teamcity-regression.xml
      logs_artifact_name: teamcity-regression-logs
      results_artifact_name: teamcity-regression-test-results
      page_artifact_name: teamcity-regression-login-page
