name: TeamCity Start Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  teamcity-start-smoke:
    name: Start TeamCity
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      allure_pages_ready: ${{ steps.teamcity-pytest.outputs.allure_pages_ready }}
    steps:
      # Скачиваем код репозитория, чтобы runner видел local action, scripts, tests и compose-файл.
      - name: Checkout
        uses: actions/checkout@v4

      # Общая логика запуска TeamCity и pytest вынесена в local composite action,
      # чтобы переиспользовать ее без отдельного workflow в GitHub Actions UI.
      - name: Run TeamCity smoke tests
        id: teamcity-pytest
        uses: ./.github/actions/teamcity-pytest
        with:
          pytest_marker: smoke
          test_label: smoke
          junit_filename: teamcity-smoke.xml
          logs_artifact_name: teamcity-start-smoke-logs
          results_artifact_name: teamcity-smoke-test-results
          page_artifact_name: teamcity-login-page

  deploy-allure-pages:
    name: Publish Allure report page
    if: ${{ always() && needs.teamcity-start-smoke.outputs.allure_pages_ready == 'true' }}
    needs: teamcity-start-smoke
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}${{ steps.pages.outputs.report_path }}/
    steps:
      # Скачиваем код, чтобы runner видел local action для обновления Pages history.
      - name: Checkout
        uses: actions/checkout@v4

      # Добавляем текущий Allure HTML-report в уникальный каталог Pages site.
      - name: Prepare persistent Allure report page
        id: pages
        uses: ./.github/actions/publish-allure-pages
        with:
          report_artifact_name: teamcity-smoke-allure-report
          suite_name: smoke

      # Публикуем накопленный Pages site с историей отчетов.
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # Добавляем кликабельную ссылку на конкретный отчет в summary текущего workflow run.
      - name: Add Allure report page to summary
        run: |
          echo "## Allure report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this Allure report](${{ steps.deployment.outputs.page_url }}${{ steps.pages.outputs.report_path }}/)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open all reports index](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"
