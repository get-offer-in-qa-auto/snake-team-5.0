name: TeamCity Start Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: python3 -m pip install -r requirements-dev.txt

      # Быстрые статические проверки идут первыми, чтобы не тратить время
      # на запуск Docker-стенда при очевидных проблемах в коде.
      - name: Lint Python code
        run: python3 -m ruff check .

      - name: Check Python formatting
        run: python3 -m ruff format --check .

      - name: Check static types
        run: python3 -m mypy src/main

  teamcity-start-smoke:
    name: TeamCity regression
    needs: code-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      allure_pages_ready: ${{ steps.teamcity-report.outputs.allure_pages_ready }}
    steps:
      # Скачиваем код репозитория, чтобы runner видел local action, scripts, tests и compose-файл.
      - name: Checkout
        uses: actions/checkout@v4

      # Setup, тесты и сбор результатов остаются в одном job, чтобы Docker-стенд
      # и временный TeamCity access token сохранялись на одном runner.
      - name: Start and prepare TeamCity
        uses: ./.github/actions/teamcity-setup
        with:
          database_preflight: "true"

      - name: Run TeamCity smoke gate
        uses: ./.github/actions/teamcity-test
        with:
          pytest_marker: smoke
          pytest_workers: "0"
          junit_filename: smoke-teamcity-regression.xml

      - name: Run remaining TeamCity regression tests
        uses: ./.github/actions/teamcity-test
        with:
          pytest_marker: "(regression) and not smoke"
          pytest_workers: "0"
          junit_filename: teamcity-regression.xml
          preserve_allure_results: "true"

      - name: Build reports and stop TeamCity
        id: teamcity-report
        if: always()
        uses: ./.github/actions/teamcity-report
        with:
          test_label: regression
          logs_artifact_name: teamcity-regression-logs
          results_artifact_name: teamcity-regression-test-results
          page_artifact_name: teamcity-regression-login-page

  deploy-allure-pages:
    name: Publish Allure report page
    if: ${{ always() && needs.teamcity-start-smoke.outputs.allure_pages_ready == 'true' }}
    needs: teamcity-start-smoke
    runs-on: ubuntu-latest
    concurrency:
      group: github-pages
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}${{ steps.pages.outputs.report_path }}/
    steps:
      # Скачиваем код, чтобы runner видел local action для обновления Pages history.
      - name: Checkout
        uses: actions/checkout@v4

      # Добавляем текущий Allure HTML-report в уникальный каталог Pages site.
      - name: Prepare persistent Allure report page
        id: pages
        uses: ./.github/actions/publish-allure-pages
        with:
          report_artifact_name: teamcity-regression-allure-report
          suite_name: regression

      # Публикуем накопленный Pages site с историей отчетов.
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      # Добавляем кликабельную ссылку на конкретный отчет в summary текущего workflow run.
      - name: Add Allure report page to summary
        run: |
          echo "## Allure report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open this Allure report](${{ steps.deployment.outputs.page_url }}${{ steps.pages.outputs.report_path }}/)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open all reports index](${{ steps.deployment.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"
