name: TeamCity Start Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  teamcity-start-smoke:
    name: Start TeamCity
    # Общая логика запуска TeamCity и pytest вынесена в reusable workflow.
    uses: ./.github/workflows/teamcity-pytest.yml
    with:
      pytest_marker: smoke
      test_label: smoke
      timeout_minutes: 20
      junit_filename: teamcity-smoke.xml
      logs_artifact_name: teamcity-start-smoke-logs
      results_artifact_name: teamcity-smoke-test-results
      page_artifact_name: teamcity-login-page
