name: Telegram CI Notify

on:
  workflow_run:
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  notify-telegram:
    name: Notify Telegram
    if: ${{ github.event.workflow_run.name != github.workflow }}
    runs-on: ubuntu-latest
    steps:
      # Workflow_run берет workflow-файл из default branch, поэтому Telegram secrets
      # не исполняются из кода pull request.
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Send Telegram notification
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: python3 .github/scripts/send_telegram_ci_notification.py
