name: TeamCity Pytest
description: Start TeamCity in Docker, run pytest, collect artifacts, and prepare an Allure report.

inputs:
  pytest_marker:
    description: Pytest marker to run, for example smoke or regression.
    required: true
  pytest_workers:
    description: Number of pytest-xdist workers. Use 0 for serial execution or auto for one worker per CPU core.
    required: false
    default: "3"
  test_label:
    description: Human-readable test suite label used in step names.
    required: true
  junit_filename:
    description: JUnit XML filename saved under artifacts/test-results.
    required: true
  logs_artifact_name:
    description: Artifact name for TeamCity and Docker Compose logs.
    required: true
  results_artifact_name:
    description: Artifact name for pytest JUnit XML results.
    required: true
  page_artifact_name:
    description: Artifact name for captured TeamCity login page response.
    required: true
  teamcity_url:
    description: TeamCity URL exposed to the runner through Docker port mapping.
    required: false
    default: http://localhost:8111/login.html
  compose_file:
    description: Docker Compose file used to start the TeamCity test stand.
    required: false
    default: ci/teamcity/compose.yaml
  server_container:
    description: TeamCity server container name used for logs and backup access.
    required: false
    default: teamcity-server-ci
  database_mode:
    description: First-start database mode, either internal or external.
    required: false
    default: internal
  agent_name:
    description: Name of the TeamCity agent that must be authorized before build-execution tests.
    required: false
    default: ci-agent-1
  wait_timeout_seconds:
    description: Maximum time to wait until TeamCity starts answering HTTP.
    required: false
    default: "300"
  wait_interval_seconds:
    description: Delay between TeamCity readiness checks.
    required: false
    default: "2"
  request_timeout_seconds:
    description: Timeout for one HTTP request to TeamCity.
    required: false
    default: "5"
  database_preflight:
    description: Run a real TeamCity database backup preflight before pytest.
    required: false
    default: "false"
  smoke_gate:
    description: Run serial smoke tests first, then run the selected suite without smoke tests.
    required: false
    default: "false"
outputs:
  allure_pages_ready:
    description: "true when the generated Allure report has index.html and can be deployed to Pages."
    value: ${{ steps.allure-pages.outputs.ready }}

runs:
  using: composite
  steps:
    # Проверяем Docker в самом начале, чтобы быстро понять,
    # сможет ли runner запустить TeamCity Server и Agent в контейнерах.
    - name: Check Docker availability
      shell: bash
      run: |
        docker --version
        docker compose version

    # Готовим Python 3.12 для запуска helper-скриптов и pytest-тестов.
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # Устанавливаем зависимости тестового проекта из requirements.txt.
    - name: Install test dependencies
      shell: bash
      run: python3 -m pip install -r requirements.txt

    # Создаем уникальный пароль администратора только на время текущего runner.
    # Пароль маскируется и не хранится в repository secrets или artifacts.
    - name: Generate TeamCity CI administrator credentials
      shell: bash
      run: |
        password="$(openssl rand -hex 24)"
        echo "::add-mask::$password"
        echo "TEAMCITY_USERNAME=ci-initial-admin" >> "$GITHUB_ENV"
        echo "TEAMCITY_PASSWORD=$password" >> "$GITHUB_ENV"

    # Поднимаем TeamCity Server и Agent в Docker Compose в фоне.
    # В этом стенде нет внешней БД: TeamCity использует внутреннюю database в data directory.
    - name: Start TeamCity server and agent
      shell: bash
      run: docker compose -f "${{ inputs.compose_file }}" up -d

    # Ждем, пока TeamCity начнет отвечать по HTTP,
    # потому что контейнер может быть запущен раньше, чем готов web UI.
    - name: Wait for TeamCity web endpoint
      shell: bash
      run: |
        python3 scripts/teamcity_start_smoke.py \
          --url "${{ inputs.teamcity_url }}" \
          --timeout "${{ inputs.wait_timeout_seconds }}" \
          --interval "${{ inputs.wait_interval_seconds }}" \
          --request-timeout "${{ inputs.request_timeout_seconds }}" \
          --access-token-output "${RUNNER_TEMP}/teamcity-access-token" \
          --database-mode "${{ inputs.database_mode }}" \
          --auto-setup

    # Все последующие административные REST-запросы используют временный Bearer
    # token. Это исключает зависимость от super-user и CSRF session для backup API.
    - name: Export TeamCity CI access token
      shell: bash
      run: |
        token_file="${RUNNER_TEMP}/teamcity-access-token"
        if [ ! -s "$token_file" ]; then
          echo "TeamCity access token file is missing or empty." >&2
          exit 1
        fi
        token="$(<"$token_file")"
        echo "::add-mask::$token"
        echo "TEAMCITY_ACCESS_TOKEN=$token" >> "$GITHUB_ENV"
        echo "TEAMCITY_PASSWORD=" >> "$GITHUB_ENV"
        rm -f "$token_file"

    - name: Authorize and wait for TeamCity build agent
      shell: bash
      run: python3 -m scripts.teamcity_agent_preflight --name "${{ inputs.agent_name }}"

    # Regression DB-проверки используют online backup TeamCity. Проверяем точный
    # POST/copy/read/remove lifecycle до запуска всей pytest suite.
    - name: Verify TeamCity database backup access
      if: ${{ inputs.database_preflight == 'true' }}
      shell: bash
      env:
        TEAMCITY_DB_CONTAINER: ${{ inputs.server_container }}
      run: python3 -m scripts.teamcity_database_preflight

    # В gated-режиме smoke выполняется первым и последовательно. Любое падение
    # останавливает основной test run, но always()-шаги ниже сохраняют диагностику.
    - name: Run TeamCity smoke gate tests
      if: ${{ success() && inputs.smoke_gate == 'true' }}
      shell: bash
      env:
        TEAMCITY_DB_CONTAINER: ${{ inputs.server_container }}
        TEAMCITY_CONFIG_CONTAINER: ${{ inputs.server_container }}
      run: |
        mkdir -p artifacts/test-results
        python3 -m pytest \
          -m "smoke" \
          -n "0" \
          --junitxml="artifacts/test-results/smoke-${{ inputs.junit_filename }}"

    # Smoke-тесты уже входят в regression marker, поэтому исключаем их из второго
    # запуска. Переопределение addopts сохраняет smoke Allure results: второй pytest
    # не выполняет повторный --clean-alluredir.
    - name: Run remaining TeamCity ${{ inputs.test_label }} tests
      if: ${{ success() && inputs.smoke_gate == 'true' }}
      shell: bash
      env:
        TEAMCITY_DB_CONTAINER: ${{ inputs.server_container }}
        TEAMCITY_CONFIG_CONTAINER: ${{ inputs.server_container }}
      run: |
        python3 -m pytest \
          -o addopts="--alluredir=artifacts/allure-results" \
          -m "(${{ inputs.pytest_marker }}) and not smoke" \
          -n "${{ inputs.pytest_workers }}" \
          --junitxml="artifacts/test-results/${{ inputs.junit_filename }}"

    # Обычный режим сохраняет прежнее поведение action: запускает одну выбранную
    # suite. Значение workers=0 отключает pytest-xdist.
    - name: Run TeamCity ${{ inputs.test_label }} tests
      if: ${{ success() && inputs.smoke_gate != 'true' }}
      shell: bash
      env:
        TEAMCITY_DB_CONTAINER: ${{ inputs.server_container }}
        TEAMCITY_CONFIG_CONTAINER: ${{ inputs.server_container }}
      run: |
        mkdir -p artifacts/test-results
        python3 -m pytest \
          -m "${{ inputs.pytest_marker }}" \
          -n "${{ inputs.pytest_workers }}" \
          --junitxml="artifacts/test-results/${{ inputs.junit_filename }}"

    # Allure CLI требует Java, поэтому готовим JDK перед генерацией HTML-отчета.
    - name: Set up Java for Allure
      if: always()
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    # Подкладываем history из последнего опубликованного отчета той же suite/job,
    # чтобы Allure trend не смешивал smoke и regression между собой.
    - name: Restore Allure history
      if: always()
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        if [ ! -d artifacts/allure-results ] || [ "$(find artifacts/allure-results -type f | wc -l)" -eq 0 ]; then
          echo "No Allure results found, skipping history restore."
          exit 0
        fi

        remote_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        if git ls-remote --exit-code --heads "$remote_url" gh-pages >/dev/null 2>&1; then
          rm -rf pages-history
          git clone --depth=1 --branch gh-pages "$remote_url" pages-history
          python3 .github/scripts/restore_allure_history.py \
            --site-dir pages-history \
            --suite "${{ inputs.test_label }}" \
            --results-dir artifacts/allure-results
        else
          echo "No gh-pages branch found, skipping history restore."
        fi

    # Устанавливаем Allure commandline и сразу собираем статический HTML-report.
    - name: Generate Allure report
      if: always()
      shell: bash
      run: |
        if [ -d artifacts/allure-results ] && [ "$(find artifacts/allure-results -type f | wc -l)" -gt 0 ]; then
          npm install -g allure-commandline
          allure generate artifacts/allure-results --clean -o artifacts/allure-report
        else
          echo "No Allure results found, skipping report generation."
        fi

    # Сохраняем ответ login page даже при падении предыдущих шагов,
    # чтобы в artifacts было видно, что реально вернул TeamCity.
    - name: Capture TeamCity login page
      if: always()
      shell: bash
      run: python3 scripts/teamcity_capture_page.py --url "${{ inputs.teamcity_url }}" --output-dir artifacts/teamcity-page

    # Печатаем состояние контейнеров в лог CI,
    # чтобы сразу видеть, запущены ли server и agent после проверки.
    - name: Show container status
      if: always()
      shell: bash
      run: docker compose -f "${{ inputs.compose_file }}" ps

    # Собираем состояние Docker Compose и логи контейнеров в файлы,
    # чтобы их можно было скачать и разобрать после завершения workflow.
    - name: Collect TeamCity logs
      if: always()
      shell: bash
      run: |
        mkdir -p artifacts/teamcity
        docker compose -f "${{ inputs.compose_file }}" ps > artifacts/teamcity/docker-compose-ps.txt
        docker compose -f "${{ inputs.compose_file }}" logs --no-color > artifacts/teamcity/docker-compose.log
        if docker inspect "${{ inputs.server_container }}" >/dev/null 2>&1; then
          mkdir -p artifacts/teamcity/server-logs
          if ! docker cp "${{ inputs.server_container }}:/opt/teamcity/logs/." artifacts/teamcity/server-logs; then
            echo "::warning title=TeamCity logs::Could not copy TeamCity server log files."
          fi
        fi

    # Загружаем логи TeamCity и Docker Compose как artifact GitHub Actions.
    - name: Upload TeamCity logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.logs_artifact_name }}
        path: artifacts/teamcity
        if-no-files-found: ignore
        retention-days: 7

    # Загружаем JUnit XML с результатами pytest-тестов.
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.results_artifact_name }}
        path: artifacts/test-results
        if-no-files-found: ignore
        retention-days: 7

    # Загружаем сырые Allure results, чтобы отчет можно было пересобрать при необходимости.
    - name: Upload Allure results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: teamcity-${{ inputs.test_label }}-allure-results
        path: artifacts/allure-results
        if-no-files-found: ignore
        retention-days: 7

    # Загружаем готовый Allure HTML-report как artifact GitHub Actions.
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: teamcity-${{ inputs.test_label }}-allure-report
        path: artifacts/allure-report
        if-no-files-found: ignore
        retention-days: 7

    # Проверяем, можно ли опубликовать готовый HTML-report как GitHub Pages site.
    - name: Check Allure report for Pages
      id: allure-pages
      if: always()
      shell: bash
      run: |
        if [ -f artifacts/allure-report/index.html ]; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
        else
          echo "ready=false" >> "$GITHUB_OUTPUT"
        fi

    # Загружаем сохраненный ответ login page как artifact для диагностики UI.
    - name: Upload TeamCity page snapshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.page_artifact_name }}
        path: artifacts/teamcity-page
        if-no-files-found: ignore
        retention-days: 7

    # Останавливаем контейнеры и удаляем временные volumes,
    # чтобы следующий запуск CI стартовал с чистого TeamCity стенда.
    - name: Stop TeamCity
      if: always()
      shell: bash
      run: docker compose -f "${{ inputs.compose_file }}" down -v
