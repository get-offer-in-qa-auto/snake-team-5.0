[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = ["artifacts", "teamcity-local"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
files = ["src/main"]
explicit_package_bases = true
exclude = ["artifacts", "teamcity-local"]
