server=http://localhost:8111
apiBasePath=/app/rest
apiVersion=2026.1.1
apiBuildNumber=222577

ADMIN_AUTH_HEADER=<BASIC_TOKEN>
ADMIN_USERNAME=admin
ADMIN_PASSWORD=admin

MODEL_COMPARISON_CONFIG_FILE=model-comparison.properties

# Database verification adapter. `auto` uses PostgreSQL when TEAMCITY_DB_DSN is
# set and otherwise reads a consistent database snapshot created by TeamCity.
TEAMCITY_DB_ADAPTER=auto
TEAMCITY_DB_BACKUP_TIMEOUT=120
TEAMCITY_DB_CONTAINER=teamcity-server-local
